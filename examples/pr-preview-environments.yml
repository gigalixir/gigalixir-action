# Pull Request Preview Environments
#
# Creates a unique Gigalixir app for each pull request, complete with its own
# database. The app is automatically destroyed when the PR is closed/merged.
#
# App naming: my-app-pr-<PR_NUMBER> (e.g., my-app-pr-123)
#
# Required secrets:
#   - GIGALIXIR_EMAIL: Your Gigalixir account email
#   - GIGALIXIR_API_KEY: Your Gigalixir API key
#
# GitHub Deployments Integration:
#   Set github_deployments: true to track deployments in GitHub's UI.
#   This creates deployment records with status updates and environment URLs.
#   Note: Not available for private repos on GitHub Free plan.
#
# Note: This workflow uses the free database tier. For paid databases,
# change database_size to a valid size (0.6, 1.7, 4, 8, 16, 32, 48, 64, 96)

name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  issue_comment:
    types: [created]

# Prevent concurrent deployments for the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

# Required for GitHub Deployments API
permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  # Base name for your production app - preview apps will be named <BASE>-pr-<NUMBER>
  APP_BASE_NAME: my-app
  # Source app to copy environment config from (usually your staging app)
  CONFIG_SOURCE_APP: my-app-staging

jobs:
  # Deploy preview environment when PR is opened or updated
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.deploy.outputs.app_name }}
      app_url: ${{ steps.deploy.outputs.app_url }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create and deploy preview app
        id: deploy
        uses: gigalixir/gigalixir-action@v1
        with:
          gigalixir_email: ${{ secrets.GIGALIXIR_EMAIL }}
          gigalixir_api_key: ${{ secrets.GIGALIXIR_API_KEY }}
          app_name: ${{ env.APP_BASE_NAME }}-pr-${{ github.event.pull_request.number }}
          action: create_deploy
          database_size: free
          copy_config_from: ${{ env.CONFIG_SOURCE_APP }}
          # Enable GitHub Deployments tracking (set to false for private repos on Free plan)
          github_deployments: true
          github_environment: pr-${{ github.event.pull_request.number }}
          git_ref: ${{ github.event.pull_request.head.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const appUrl = '${{ steps.deploy.outputs.app_url }}';
            const appName = '${{ steps.deploy.outputs.app_name }}';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Environment')
            );

            const body = `## 🚀 Preview Environment

            | Name | Value |
            |------|-------|
            | **App** | \`${appName}\` |
            | **URL** | ${appUrl} |
            | **Commit** | ${sha} |
            | **Status** | ✅ Deployed |

            The preview environment will be automatically destroyed when this PR is closed.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  # Destroy preview environment when PR is closed
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Destroy preview app
        uses: gigalixir/gigalixir-action@v1
        with:
          gigalixir_email: ${{ secrets.GIGALIXIR_EMAIL }}
          gigalixir_api_key: ${{ secrets.GIGALIXIR_API_KEY }}
          app_name: ${{ env.APP_BASE_NAME }}-pr-${{ github.event.pull_request.number }}
          action: destroy

      - name: Comment on PR about cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const appName = '${{ env.APP_BASE_NAME }}-pr-${{ github.event.pull_request.number }}';

            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Environment')
            );

            const body = `## 🚀 Preview Environment

            | Name | Value |
            |------|-------|
            | **App** | \`${appName}\` |
            | **Status** | 🗑️ Destroyed |

            The preview environment has been cleaned up.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            }

  # Scale preview environment via PR comment (e.g., "/scale 0", "/scale 2", "/scale 1 0.5")
  scale-preview:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/scale ')
    runs-on: ubuntu-latest

    steps:
      - name: Parse scale command
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const match = comment.match(/^\/scale\s+(\d+)(?:\s+([\d.]+))?$/);
            if (!match) {
              core.setFailed('Invalid /scale command. Usage: /scale <replicas> [size]');
              return;
            }
            core.setOutput('replicas', match[1]);
            core.setOutput('size', match[2] || '');

      - name: Scale preview app
        uses: gigalixir/gigalixir-action@v1
        with:
          gigalixir_email: ${{ secrets.GIGALIXIR_EMAIL }}
          gigalixir_api_key: ${{ secrets.GIGALIXIR_API_KEY }}
          app_name: ${{ env.APP_BASE_NAME }}-pr-${{ github.event.issue.number }}
          action: scale
          replicas: ${{ steps.parse.outputs.replicas }}
          size: ${{ steps.parse.outputs.size }}

      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });
